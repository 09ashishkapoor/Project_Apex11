name: sadhana_for_a_khyapa
description: A local-first devotional japa and sadhana tracker with bundled mantra audio.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  cupertino_icons: ^1.0.8
  drift: ^2.28.1
  drift_flutter: ^0.2.8
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.39
  wakelock_plus: ^1.3.2

dev_dependencies:
  build_runner: ^2.4.15
  drift_dev: ^2.28.2
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/audio/batuk.mp3
    - assets/audio/swarna.mp3
    - assets/audio/skanda.mp3
    - assets/audio/maha.mp3
    - assets/images/batuk1.jpg
    - assets/images/swarna.jpg
    - assets/images/skanda.jpg
    - assets/images/maha1.jpg
